<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>For Hailey</title>

<!-- keep this private gift out of search engines -->
<meta name="robots" content="noindex, nofollow" />
<!-- mobile browser chrome matches the dark violet -->
<meta name="theme-color" content="#0c0720" />
<!-- 💜 favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%92%9C</text></svg>" />

<!-- link preview card (shows when the URL is texted/shared) -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://conorabc.github.io/for-hailey/" />
<meta property="og:title" content="For Hailey 💜" />
<meta property="og:description" content="something I made for you. tap the light." />
<meta property="og:image" content="https://conorabc.github.io/for-hailey/preview.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="For Hailey 💜" />
<meta name="twitter:description" content="something I made for you. tap the light." />
<meta name="twitter:image" content="https://conorabc.github.io/for-hailey/preview.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Crafty+Girls&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 38%, #1a0f33 0%, #0c0720 48%, #060410 100%);
    touch-action: none;
    cursor: crosshair;
  }
  canvas { display: block; transition: opacity 1.1s ease; }
  #hint {
    position: fixed;
    bottom: 26px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "Crafty Girls", "Comic Sans MS", cursive;
    font-size: 17px;
    letter-spacing: 0.5px;
    color: rgba(214, 188, 255, 0.45);
    pointer-events: none;
    transition: opacity 1.4s ease;
    opacity: 0;
  }
  #gif {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain; /* fill the screen, as large as possible, no distortion */
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transition: opacity 1.1s ease;
    /* glow hugs the cat itself, not a box */
    filter: drop-shadow(0 0 30px rgba(150, 86, 240, 0.6));
  }
  #gif.show {
    opacity: 1;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">touch the light &middot; tap to continue</div>
<img id="gif" src="dance.webp" alt="" onerror="this.style.display='none'" />
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: true });
  const hint = document.getElementById("hint");
  const gifEl = document.getElementById("gif");
  let gifShown = false;

  let W = 0, H = 0, DPR = 1;
  const FONT_FAMILY = '"Crafty Girls", "Comic Sans MS", cursive';

  // ---- Cohesive violet gradient (pale lavender -> deep violet) --------------
  const STOPS = [
    { p: 0.0, c: [240, 222, 255] }, // pale lavender (top)
    { p: 0.42, c: [193, 138, 255] }, // soft violet
    { p: 0.72, c: [150, 86, 240] }, // violet
    { p: 1.0, c: [110, 58, 214] }, // deep violet (bottom)
  ];
  function gradAt(t) {
    t = t < 0 ? 0 : t > 1 ? 1 : t;
    for (let i = 1; i < STOPS.length; i++) {
      if (t <= STOPS[i].p) {
        const a = STOPS[i - 1], b = STOPS[i];
        const k = (t - a.p) / (b.p - a.p);
        return [
          Math.round(a.c[0] + (b.c[0] - a.c[0]) * k),
          Math.round(a.c[1] + (b.c[1] - a.c[1]) * k),
          Math.round(a.c[2] + (b.c[2] - a.c[2]) * k),
        ];
      }
    }
    return STOPS[STOPS.length - 1].c;
  }
  // Precompute swatches (rgb arrays) so glow sprites can be cached.
  const SWATCH_N = 48;
  const SWATCHES = [];
  for (let i = 0; i < SWATCH_N; i++) SWATCHES.push(gradAt(i / (SWATCH_N - 1)));
  const SPARKLE_RGB = [255, 248, 255];

  function lighten(c, a) {
    return [
      Math.round(c[0] + (255 - c[0]) * a),
      Math.round(c[1] + (255 - c[1]) * a),
      Math.round(c[2] + (255 - c[2]) * a),
    ];
  }

  // ---- Pre-rendered soft sprite (color-true, normal blending) ---------------
  // Core is a *lightened* tint of the particle's own violet (NOT white), with a
  // soft alpha falloff. Drawn with source-over so dense letters stay violet and
  // crisp instead of summing to white.
  const glowCache = {};
  function getGlowSprite(rgb, radius) {
    const key = rgb[0] + "," + rgb[1] + "," + rgb[2] + "|" + radius;
    if (glowCache[key]) return glowCache[key];
    const size = radius * 2;
    const off = document.createElement("canvas");
    off.width = off.height = size;
    const octx = off.getContext("2d");
    const core = lighten(rgb, 0.5);
    const g = octx.createRadialGradient(radius, radius, 0, radius, radius, radius);
    g.addColorStop(0, `rgba(${core[0]},${core[1]},${core[2]},1)`);
    g.addColorStop(0.4, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.92)`);
    g.addColorStop(0.75, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.35)`);
    g.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
    octx.fillStyle = g;
    octx.beginPath();
    octx.arc(radius, radius, radius, 0, Math.PI * 2);
    octx.fill();
    glowCache[key] = off;
    return off;
  }

  // ---- Offscreen sampler ----------------------------------------------------
  const sampler = document.createElement("canvas");
  const sctx = sampler.getContext("2d", { willReadFrequently: true });

  function collectPoints(step) {
    const img = sctx.getImageData(0, 0, sampler.width, sampler.height).data;
    const pts = [];
    for (let y = 0; y < sampler.height; y += step) {
      for (let x = 0; x < sampler.width; x += step) {
        if (img[(y * sampler.width + x) * 4 + 3] > 140) pts.push({ x, y });
      }
    }
    return pts;
  }
  function prepSampler() {
    sampler.width = W;
    sampler.height = H;
  }
  function sampleStep() {
    return Math.max(2, Math.round(Math.min(W, H) / 300));
  }

  function sampleText(text) {
    prepSampler();
    sctx.clearRect(0, 0, W, H);
    sctx.fillStyle = "#fff";
    sctx.textAlign = "center";
    sctx.textBaseline = "middle";
    let fs = H * 0.32;
    const font = (s) => `${s}px ${FONT_FAMILY}`;
    sctx.font = font(fs);
    while (sctx.measureText(text).width > W * 0.84 && fs > 12) {
      fs *= 0.94;
      sctx.font = font(fs);
    }
    sctx.fillText(text, W / 2, H / 2);
    return collectPoints(sampleStep());
  }

  function sampleHeart() {
    prepSampler();
    sctx.clearRect(0, 0, W, H);
    sctx.fillStyle = "#fff";
    const scale = (H * 0.36) / 30;
    const cx = W / 2, cy = H / 2;
    sctx.beginPath();
    for (let t = 0; t <= Math.PI * 2 + 0.05; t += 0.008) {
      const hx = 16 * Math.pow(Math.sin(t), 3);
      const hy = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      const px = cx + hx * scale, py = cy - hy * scale;
      if (t === 0) sctx.moveTo(px, py); else sctx.lineTo(px, py);
    }
    sctx.closePath();
    sctx.fill();
    return collectPoints(sampleStep());
  }

  // ---- Particles ------------------------------------------------------------
  let particles = [];
  let PARTICLE_COUNT = 2600;

  function computeCount() {
    const area = W * H;
    PARTICLE_COUNT = Math.max(1500, Math.min(4200, Math.round(area / 480)));
  }

  function makeParticle() {
    const isSparkle = Math.random() < 0.05;
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0, vy: 0,
      tx: W / 2, ty: H / 2,
      hx: W / 2, hy: H / 2, // home (pre-breathing) target
      size: isSparkle ? 0.5 + Math.random() * 0.6 : 0.7 + Math.random() * 1.1,
      swatch: 0,
      isSparkle,
      spring: 0.027 + Math.random() * 0.01,
      delay: 0,
      tw: Math.random() * Math.PI * 2,
      tws: 0.015 + Math.random() * 0.03,
      bphase: Math.random() * Math.PI * 2, // breathing
    };
  }

  // Add/remove particles to match the target count WITHOUT resetting the ones
  // that already exist (so a resize doesn't re-scatter the formation).
  function reconcileCount() {
    while (particles.length < PARTICLE_COUNT) particles.push(makeParticle());
    if (particles.length > PARTICLE_COUNT) particles.length = PARTICLE_COUNT;
  }

  function assignTargets(points, now) {
    const n = PARTICLE_COUNT;
    if (points.length === 0) {
      for (const p of particles) { p.hx = W / 2; p.hy = H / 2; }
      return;
    }
    // bounds for vertical gradient mapping
    let minY = Infinity, maxY = -Infinity;
    for (const pt of points) { if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y; }
    const span = Math.max(1, maxY - minY);

    // shuffle copy
    const src = points.slice();
    for (let i = src.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      const t = src[i]; src[i] = src[j]; src[j] = t;
    }
    for (let i = 0; i < n; i++) {
      const pt = src[i % src.length];
      const p = particles[i];
      p.hx = pt.x + (Math.random() - 0.5) * 1.6;
      p.hy = pt.y + (Math.random() - 0.5) * 1.6;
      const tnorm = (pt.y - minY) / span;
      p.swatch = Math.min(SWATCH_N - 1, Math.max(0, Math.round(tnorm * (SWATCH_N - 1))));
      p.delay = Math.random() * 420; // staggered ripple (ms)
    }
  }

  // ---- Phase machine --------------------------------------------------------
  const SHAPES = [
    { type: "text", value: "Hailey" },
    { type: "heart" },
    { type: "text", value: "I love you" },
  ];
  const LOVE_INDEX = SHAPES.length - 1; // "I love you" is the last shape
  let shapeIndex = 0, phaseStart = 0, phase = "intro", introUntil = 0;
  const MORPH_MS = 2200;

  function applyShape(i, now) {
    const s = SHAPES[i];
    assignTargets(s.type === "heart" ? sampleHeart() : sampleText(s.value), now);
  }
  // Tap handler: burst the particles outward, then form the next shape.
  function scatterAndAdvance() {
    // Final state: once "I love you" is reached, stay there (no looping back).
    if (phase === "shape" && shapeIndex === LOVE_INDEX) return;
    const now = performance.now();
    for (const p of particles) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 7 + Math.random() * 11;
      p.vx += Math.cos(ang) * sp;
      p.vy += Math.sin(ang) * sp;
      p.delay = Math.random() * 380; // re-stagger the reform
    }
    if (phase === "intro") { phase = "shape"; shapeIndex = 0; }
    else { shapeIndex = (shapeIndex + 1) % SHAPES.length; }
    applyShape(shapeIndex, now);
    phaseStart = now;
  }

  function startIntro(now) {
    phase = "intro";
    introUntil = now + 1900;
    for (const p of particles) {
      const ang = Math.random() * Math.PI * 2;
      const rad = Math.min(W, H) * (0.25 + Math.random() * 0.35);
      p.hx = W / 2 + Math.cos(ang) * rad;
      p.hy = H / 2 + Math.sin(ang) * rad * 0.6;
      p.swatch = Math.round(Math.random() * (SWATCH_N - 1));
      p.delay = Math.random() * 300;
    }
    phaseStart = now;
  }

  // ---- Pointer --------------------------------------------------------------
  // Drag/hover repels the light; a quick tap scatters it and advances the shape.
  const pointer = { x: -9999, y: -9999, active: false };
  const REPEL_R = 95, REPEL_R2 = REPEL_R * REPEL_R;
  let downX = 0, downY = 0, downT = 0, isDown = false, moved = false;

  canvas.addEventListener("pointerdown", (e) => {
    isDown = true; moved = false;
    downX = e.clientX; downY = e.clientY; downT = performance.now();
    pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
  });
  canvas.addEventListener("pointermove", (e) => {
    pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
    if (isDown) {
      const dx = e.clientX - downX, dy = e.clientY - downY;
      if (dx * dx + dy * dy > 100) moved = true; // >10px = a drag, not a tap
    }
  });
  canvas.addEventListener("pointerup", () => {
    pointer.active = false;
    if (isDown && !moved && performance.now() - downT < 600) scatterAndAdvance();
    isDown = false;
  });
  canvas.addEventListener("pointerleave", () => { pointer.active = false; isDown = false; });

  // ---- Resize ---------------------------------------------------------------
  let lastW = 0, lastH = 0, resizeTimer = 0;

  function applyCanvasSize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  function resize() {
    const nw = window.innerWidth, nh = window.innerHeight;
    // Mobile address bars show/hide, nudging height by ~60-120px. Treat those as
    // cosmetic: keep the canvas covering the viewport but don't recompute targets
    // (which would visibly re-scatter the formation).
    const cosmetic =
      particles.length > 0 && nw === lastW && Math.abs(nh - lastH) < 160;
    lastW = nw; lastH = nh;
    applyCanvasSize();
    if (cosmetic) return;
    computeCount();
    reconcileCount();
    if (phase === "shape") applyShape(shapeIndex, performance.now());
  }
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 120);
  });

  // ---- Loop -----------------------------------------------------------------
  let started = false;
  function tick(now) {
    requestAnimationFrame(tick);

    // Intro auto-forms the first word; after that it only advances on tap.
    if (phase === "intro" && now >= introUntil) {
      phase = "shape"; shapeIndex = 0; applyShape(0, now); phaseStart = now;
    }

    // Show the GIF once "I love you" has formed; hide it otherwise.
    const onLove =
      phase === "shape" && shapeIndex === LOVE_INDEX && now - phaseStart > MORPH_MS * 0.7;
    if (onLove !== gifShown) {
      gifShown = onLove;
      gifEl.classList.toggle("show", onLove);
      // fade the particle layer out so the words don't show behind the cat
      canvas.style.opacity = onLove ? "0" : "1";
    }

    // light, clean fade (minimal trail); normal blending keeps colors true
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(6, 4, 16, 0.5)";
    ctx.fillRect(0, 0, W, H);

    const sinceStart = now - phaseStart;
    const breath = now * 0.0011;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      // breathing offset on home target (subtle aliveness)
      p.tx = p.hx + Math.sin(breath + p.bphase) * 0.9;
      p.ty = p.hy + Math.cos(breath * 0.9 + p.bphase) * 0.9;

      // staggered spring activation
      const active = sinceStart > p.delay;
      const k = active ? p.spring : p.spring * 0.12;
      p.vx += (p.tx - p.x) * k;
      p.vy += (p.ty - p.y) * k;

      if (pointer.active) {
        const px = p.x - pointer.x, py = p.y - pointer.y;
        const d2 = px * px + py * py;
        if (d2 < REPEL_R2 && d2 > 0.01) {
          const d = Math.sqrt(d2);
          const force = (1 - d / REPEL_R) * 16;
          p.vx += (px / d) * force;
          p.vy += (py / d) * force;
        }
      }

      p.vx *= 0.85; p.vy *= 0.85;
      p.x += p.vx; p.y += p.vy;

      p.tw += p.tws;
      const tw = (p.isSparkle ? 0.55 : 0.85) + 0.15 * Math.sin(p.tw);

      const rgb = p.isSparkle ? SPARKLE_RGB : SWATCHES[p.swatch];
      const r = Math.max(3, Math.round(p.size * (p.isSparkle ? 2.0 : 2.4)));
      const sprite = getGlowSprite(rgb, r);
      const s = sprite.width;
      ctx.globalAlpha = tw;
      ctx.drawImage(sprite, p.x - s / 2, p.y - s / 2);
    }
    ctx.globalAlpha = 1;

    if (!started && now > 700) {
      started = true;
      hint.style.opacity = "1";
      setTimeout(() => (hint.style.opacity = "0"), 5200);
    }
  }

  // ---- Boot (wait for font so text samples crisply) -------------------------
  function boot() {
    resize(); // sizes the canvas and creates the particles
    startIntro(performance.now());
    requestAnimationFrame(tick);
  }
  if (document.fonts && document.fonts.load) {
    Promise.race([
      Promise.all([
        document.fonts.load('40px "Crafty Girls"'),
        document.fonts.ready,
      ]),
      new Promise((res) => setTimeout(res, 2500)),
    ]).then(boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
